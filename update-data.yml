name: Update Market Data

on:
  schedule:
    # 每个工作日运行 4 次（北京时间），覆盖美股交易关键时段
    # cron 时间是 UTC，所以这里是 UTC 时间
    - cron: '30 13 * * 1-5'  # UTC 13:30 = EDT 9:30 = 美股开盘
    - cron: '0 17 * * 1-5'   # UTC 17:00 = EDT 13:00 = 午盘
    - cron: '5 20 * * 1-5'   # UTC 20:05 = EDT 16:05 = 收盘后
    - cron: '0 23 * * *'     # UTC 23:00 = EDT 19:00 = 晚间补抓（含周末）

  # 允许手动触发
  workflow_dispatch:

# 给 Actions 写权限
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests numpy

      - name: Fetch market data
        run: python fetch_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "📊 Update market data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
