<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Market Pulse · 每日美股情绪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f3;--card:#fff;--ink:#0a0a0a;--ink2:#4a4a4a;--ink3:#8a8a8a;--line:#ececea;--green:#15c47a;--gs:#e9faf0;--gd:#0d8b56;--purple:#8b5cf6;--ps:#f1ebff;--red:#ef4444;--rs:#fde8e8;--amber:#f59e0b;--as:#fff4dd;--blue:#3b82f6;--gold:#eab308}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{background:var(--bg);font-family:'Noto Sans SC','Plus Jakarta Sans',-apple-system,sans-serif;color:var(--ink);padding:16px;min-height:100vh}
.frame{max-width:960px;margin:0 auto;background:var(--card);border-radius:24px;padding:22px 18px 18px;box-shadow:0 4px 24px rgba(0,0,0,.05)}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.badge{background:#0a0a0a;color:#fff;padding:7px 16px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;display:inline-flex;align-items:center;gap:7px}
.badge::before{content:"◆";color:#ffd84d;font-size:9px}
.datetag{background:#f0f0ee;padding:7px 14px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--ink2)}
h1{font-size:clamp(22px,5vw,36px);font-weight:900;letter-spacing:-.01em;margin-bottom:4px}
.subtitle{font-size:11px;color:var(--ink3);margin-bottom:18px;font-family:'JetBrains Mono',monospace}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.card{border:1.5px solid var(--line);border-radius:16px;padding:16px;position:relative;overflow:hidden}
.tab{position:absolute;top:0;left:16px;width:28px;height:4px;border-radius:0 0 4px 4px}
.tab.g{background:var(--green)}.tab.p{background:var(--purple)}.tab.a{background:var(--amber)}.tab.gold{background:var(--gold)}.tab.b{background:var(--blue)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:8px}
.ctitle{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13px;letter-spacing:.02em}
.csub{font-size:10px;color:var(--ink3);margin-top:2px;font-weight:500}
.pill{padding:3px 10px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;white-space:nowrap;flex-shrink:0}
.pill.up{background:var(--gs);color:var(--gd)}.pill.dn{background:var(--rs);color:var(--red)}.pill.fl{background:#f0f0ee;color:var(--ink2)}
.bignum{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:clamp(26px,5vw,42px);letter-spacing:-.02em;line-height:1;margin:12px 0 4px}
.bignum.c{text-align:center;margin:14px 0 8px}
.chg{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.chg .up{color:var(--gd)}.chg .dn{color:var(--red)}
.meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--ink2);margin-bottom:3px}
.meta .k{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--ink)}
.spill{display:inline-block;padding:5px 14px;border-radius:999px;font-size:11px;font-weight:700;border:1.5px solid}
.sw{text-align:center;margin-bottom:12px}
.spill.g{background:var(--gs);color:var(--gd);border-color:var(--green)}
.spill.p{background:var(--ps);color:var(--purple);border-color:var(--purple)}
.spill.a{background:var(--as);color:var(--amber);border-color:var(--amber)}
.spill.r{background:var(--rs);color:var(--red);border-color:var(--red)}
.zones{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.zrow{display:grid;grid-template-columns:54px 1fr 1fr 36px;gap:4px 8px;align-items:center;padding:3px 4px;border-radius:6px;font-size:11px}
.zrow.act{background:#fffbf0}
.zrow.act .zr{color:var(--amber);font-weight:800}
.zrow.act .ze,.zrow.act .zs{color:var(--ink);font-weight:700}
.zr{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--ink3);white-space:nowrap}
.ze{color:var(--ink2);font-weight:500}
.zs{color:var(--ink2);font-weight:500}
.zn{text-align:right}
.nowtag{background:var(--green);color:#fff;padding:2px 6px;border-radius:4px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:9px;letter-spacing:.08em;white-space:nowrap;display:inline-block}
.nowtag.p{background:var(--purple)}.nowtag.a{background:var(--amber)}
.spark{width:100%;height:48px;margin-top:8px}
.minispark{width:100%;height:36px;margin-top:6px}
.fgbar{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:12px}
.fgseg{height:9px;border-radius:3px}
.s1{background:#fecaca}.s2{background:#fed7aa}.s3{background:#d4d4d8}.s4{background:#fde68a}.s5{background:#fca5a5}
.fglabels{display:grid;grid-template-columns:repeat(5,1fr);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:var(--ink3);text-align:center;margin-top:4px}
.fgptr{position:relative;height:0}
.fgarrow{position:absolute;top:-4px;transform:translateX(-50%);color:var(--amber);font-size:13px;font-weight:900}
.pb{width:100%;border-collapse:separate;border-spacing:0 6px;margin-top:12px;font-size:11px}
.pb td{padding:2px 5px;vertical-align:middle}
.pbh{font-weight:700;color:var(--ink3);font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--line);padding-bottom:6px}
.pbrng{font-family:'JetBrains Mono',monospace;font-weight:700;width:54px;white-space:nowrap}
.r1 .pbrng{color:var(--red)}.r2 .pbrng{color:var(--amber)}.r3 .pbrng{color:var(--ink3)}.r4 .pbrng{color:var(--amber)}.r5 .pbrng{color:var(--red)}
.nowmini{background:var(--amber);color:#fff;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:4px;vertical-align:middle;display:inline-block}
.mcard{padding:14px 16px}
.mrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mprice{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:clamp(22px,4vw,30px);margin-top:2px}
.msub{font-size:10px;color:var(--ink3);margin-bottom:2px}
.strat{margin-top:12px;background:linear-gradient(135deg,#e9faf0,#ddf5e7);border-radius:14px;padding:14px 16px}
.strhead{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:12px;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.strhead::before{content:"◆";color:var(--gd)}
.strgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.strpill{background:#fff;border-radius:10px;padding:10px 8px;text-align:center;border:1px solid rgba(13,139,86,.15)}
.strpill .t{font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:13px;margin-bottom:3px}
.strpill .b{font-size:10px;color:var(--ink2)}
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:10px;color:var(--ink3);flex-wrap:wrap;gap:4px}
.footer .src{font-family:'JetBrains Mono',monospace}
.loading{text-align:center;padding:80px 20px;color:var(--ink3)}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{background:var(--rs);border:1.5px solid var(--red);border-radius:12px;padding:14px;color:var(--red);font-size:13px;margin:14px 0}
</style>
</head>
<body>
<div class="frame" id="app">
  <div class="loading"><div class="spin"></div><div>正在加载市场数据…</div></div>
</div>
<script>
async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    render(await r.json());
  }catch(e){
    document.getElementById('app').innerHTML='<div class="errbox">⚠️ 数据加载失败：'+e.message+'</div>';
  }
}
const fmt=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI=n=>Math.round(n).toLocaleString('en-US');
const pc=v=>v>0.05?'up':v<-0.05?'dn':'fl';
const pa=v=>v>0.05?'▲ ':v<-0.05?'▼ ':'— ';
const tc=v=>v>0?'up':v<0?'dn':'';
const sgn=v=>v>=0?'+':'';
function tpath(vals,w,h){
  if(!vals||vals.length<2)return'';
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  return vals.map((v,i)=>(i===0?'M':'L')+(i/(vals.length-1)*w).toFixed(1)+','+(h-((v-mn)/rng)*h*.85-4).toFixed(1)).join(' ');
}
function spark(vals,color,gid){
  if(!vals||vals.length<2)return'';
  const w=300,h=48,p=tpath(vals,w,h),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const ly=(h-((vals[vals.length-1]-mn)/rng)*h*.85-4).toFixed(1);
  return`<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${p} L${w},${h} L0,${h} Z" fill="url(#${gid})"/><path d="${p}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${w}" cy="${ly}" r="4" fill="${color}"/><text x="2" y="${h-2}" font-family="JetBrains Mono" font-size="8" fill="#8a8a8a">'16</text><text x="118" y="${h-2}" font-family="JetBrains Mono" font-size="8" fill="#8a8a8a">'20</text><text x="236" y="${h-2}" font-family="JetBrains Mono" font-size="8" fill="#8a8a8a">'24</text></svg>`;
}
function mspark(vals,color){
  if(!vals||vals.length<2)return'';
  const w=300,h=36,p=tpath(vals,w,h),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const ly=(h-((vals[vals.length-1]-mn)/rng)*h*.85-4).toFixed(1);
  return`<svg class="minispark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${p}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${w}" cy="${ly}" r="3.5" fill="${color}"/></svg>`;
}
function zones(list,idx,col){
  return'<div class="zones">'+list.map((z,i)=>{
    const a=i===idx?' act':'';
    const tag=i===idx?`<span class="nowtag ${col}">NOW</span>`:'';
    return`<div class="zrow${a}"><span class="zr">${z.r}</span><span class="ze">${z.e}</span><span class="zs">${z.s}</span><span class="zn">${tag}</span></div>`;
  }).join('')+'</div>';
}
const VZ=[{r:'< 12',e:'极度乐观',s:'谨慎追高'},{r:'12—20',e:'正常区间',s:'常规定投'},{r:'20—30',e:'恐惧上升',s:'加大定投'},{r:'30—50',e:'市场恐慌',s:'加倍定投'},{r:'> 50',e:'极度恐慌',s:'大胆抄底'}];
const XZ=[{r:'< 15',e:'极度乐观',s:'谨慎追高'},{r:'15—22',e:'正常区间',s:'常规定投'},{r:'22—32',e:'恐惧上升',s:'加大定投'},{r:'32—55',e:'市场恐慌',s:'加倍定投'},{r:'> 55',e:'极度恐慌',s:'大胆抄底'}];
const RZ=[{r:'< 30',e:'超卖',s:'黄金机会'},{r:'30—50',e:'偏弱',s:'加大定投'},{r:'50—70',e:'中性',s:'常规定投'},{r:'70—80',e:'偏强',s:'谨慎追高'},{r:'> 80',e:'超买',s:'部分止盈'}];
function render(d){
  const{SPX:spx,NDX:ndx,VIX:vix,VXN:vxn,GOLD:gold,TNX:tnx,FG:fg,strategy:strat,meta}=d;
  const fgPos=fg?Math.min(98,Math.max(2,fg.score))+'%':'50%';
  const fgIdx=fg&&fg.zone?fg.zone.idx:2;
  document.getElementById('app').innerHTML=`
  <div class="top-row"><div class="badge">DAILY MARKET PULSE</div><div class="datetag">${meta.date_str} / ${meta.weekday}</div></div>
  <h1>今日美股情绪观察</h1>
  <div class="subtitle">更新时间：${meta.updated_at}</div>
  <div class="grid">
    <div class="card"><div class="tab g"></div>
      <div class="card-head"><div><div class="ctitle">S&amp;P 500 · ^GSPC</div><div class="csub">标普500 · 收盘 ${spx.date}</div></div><div class="pill ${pc(spx.change_pct)}">${pa(spx.change_pct)}${sgn(spx.change_pct)}${spx.change_pct}%</div></div>
      <div class="bignum">${fmt(spx.last)}</div><div class="chg"><span class="${tc(spx.change_abs)}">${sgn(spx.change_abs)}${spx.change_abs}</span></div>
      <div class="meta"><span class="k">10Y TREND</span><span style="color:var(--ink3)">· 近十年走势</span></div>${spark(spx.trend,'#15c47a','gg')}
    </div>
    <div class="card"><div class="tab p"></div>
      <div class="card-head"><div><div class="ctitle">NASDAQ 100 · ^NDX</div><div class="csub">纳指100 · 收盘 ${ndx.date}</div></div><div class="pill ${pc(ndx.change_pct)}">${pa(ndx.change_pct)}${sgn(ndx.change_pct)}${ndx.change_pct}%</div></div>
      <div class="bignum">${fmt(ndx.last)}</div><div class="chg"><span class="${tc(ndx.change_abs)}">${sgn(ndx.change_abs)}${ndx.change_abs}</span></div>
      <div class="meta"><span class="k">10Y TREND</span><span style="color:var(--ink3)">· 近十年走势</span></div>${spark(ndx.trend,'#8b5cf6','pg')}
    </div>
  </div>
  <div class="grid" style="margin-top:12px">
    <div class="card"><div class="tab g"></div>
      <div class="card-head"><div><div class="ctitle">VIX · ${sgn(vix.change_pct)}${vix.change_pct}%</div><div class="csub">标普500波动率 · ${sgn(vix.change_abs)}${vix.change_abs}</div></div></div>
      <div class="bignum c">${fmt(vix.last)}</div><div class="sw"><span class="spill ${vix.zone.color}">${vix.zone.label_cn} ${vix.zone.label_en}</span></div>
      ${zones(VZ,vix.zone.idx,vix.zone.color)}
    </div>
    <div class="card"><div class="tab p"></div>
      <div class="card-head"><div><div class="ctitle">VXN · ${sgn(vxn.change_pct)}${vxn.change_pct}%</div><div class="csub">纳指100波动率 · ${sgn(vxn.change_abs)}${vxn.change_abs}</div></div></div>
      <div class="bignum c">${fmt(vxn.last)}</div><div class="sw"><span class="spill ${vxn.zone.color}">${vxn.zone.label_cn} ${vxn.zone.label_en}</span></div>
      ${zones(XZ,vxn.zone.idx,vxn.zone.color)}
    </div>
  </div>
  <div class="grid" style="margin-top:12px">
    <div class="card"><div class="tab g"></div>
      <div class="card-head"><div><div class="ctitle">S&amp;P RSI(14) · ${sgn(spx.rsi_change)}${spx.rsi_change}</div><div class="csub">标普500相对强弱</div></div></div>
      <div class="bignum c">${spx.rsi}</div><div class="sw"><span class="spill ${spx.rsi_zone.color}">${spx.rsi_zone.label_cn} ${spx.rsi_zone.label_en}</span></div>
      ${zones(RZ,spx.rsi_zone.idx,spx.rsi_zone.color)}
    </div>
    <div class="card"><div class="tab p"></div>
      <div class="card-head"><div><div class="ctitle">NDX RSI(14) · ${sgn(ndx.rsi_change)}${ndx.rsi_change}</div><div class="csub">纳指100相对强弱</div></div></div>
      <div class="bignum c">${ndx.rsi}</div><div class="sw"><span class="spill ${ndx.rsi_zone.color}">${ndx.rsi_zone.label_cn} ${ndx.rsi_zone.label_en}</span></div>
      ${zones(RZ,ndx.rsi_zone.idx,ndx.rsi_zone.color)}
    </div>
  </div>
  ${fg?`<div class="grid" style="margin-top:12px">
    <div class="card"><div class="tab a"></div>
      <div class="card-head"><div><div class="ctitle">FEAR &amp; GREED · ${sgn(fg.change)}${fg.change}</div><div class="csub">恐惧与贪婪指数</div></div></div>
      <div class="bignum c">${fg.score}</div><div class="sw"><span class="spill ${fg.zone.color}">${fg.zone.label_cn} ${fg.zone.label_en}</span></div>
      <div class="fgptr"><span class="fgarrow" style="left:${fgPos}">▼</span></div>
      <div class="fgbar"><div class="fgseg s1"></div><div class="fgseg s2"></div><div class="fgseg s3"></div><div class="fgseg s4"></div><div class="fgseg s5"></div></div>
      <div class="fglabels"><div>0-24</div><div>25-44</div><div>45-55</div><div>56-75</div><div>76-100</div></div>
    </div>
    <div class="card"><div class="tab a"></div>
      <div class="card-head"><div><div class="ctitle">F&amp;G PLAYBOOK</div><div class="csub">F&amp;G · 针对标普500</div></div></div>
      <table class="pb"><tr><td class="pbh">区间</td><td class="pbh">情绪</td><td class="pbh">策略</td></tr>
      <tr class="r1"><td class="pbrng">0-24</td><td>极度恐惧${fgIdx===0?'<span class="nowmini">NOW</span>':''}</td><td>加倍买入</td></tr>
      <tr class="r2"><td class="pbrng">25-44</td><td>恐惧${fgIdx===1?'<span class="nowmini">NOW</span>':''}</td><td>加大定投</td></tr>
      <tr class="r3"><td class="pbrng">45-55</td><td>中性${fgIdx===2?'<span class="nowmini">NOW</span>':''}</td><td>常规定投</td></tr>
      <tr class="r4"><td class="pbrng">56-75</td><td>贪婪${fgIdx===3?'<span class="nowmini">NOW</span>':''}</td><td>谨慎追高</td></tr>
      <tr class="r5"><td class="pbrng">76-100</td><td>极度贪婪${fgIdx===4?'<span class="nowmini">NOW</span>':''}</td><td>部分止盈</td></tr>
      </table>
    </div>
  </div>`:''}
  <div class="grid" style="margin-top:12px">
    ${gold?`<div class="card mcard"><div class="tab gold"></div>
      <div class="mrow"><div><div class="ctitle">GOLD · XAU/USD</div><div class="msub">伦敦金 · 美元/盎司</div></div><div class="pill ${pc(gold.change_pct)}">${pa(gold.change_pct)}${sgn(gold.change_pct)}${gold.change_pct}%</div></div>
      <div class="mprice">$${fmtI(gold.last)}</div>${mspark(gold.trend,'#eab308')}
    </div>`:''}
    ${tnx?`<div class="card mcard"><div class="tab b"></div>
      <div class="mrow"><div><div class="ctitle">10Y UST · ^TNX</div><div class="msub">十年期美债收益率</div></div><div class="pill ${pc(tnx.change_pct)}">${pa(tnx.change_pct)}${sgn(tnx.change_abs)}${tnx.change_abs}pp</div></div>
      <div class="mprice">${tnx.last}%</div>${mspark(tnx.trend,'#3b82f6')}
    </div>`:''}
  </div>
  ${strat?`<div class="strat"><div class="strhead">TODAY'S STRATEGY · 今日策略</div><div class="strgrid">${strat.map(s=>`<div class="strpill"><div class="t">${s.top}</div><div class="b">${s.bot}</div></div>`).join('')}</div></div>`:''}
  <div class="footer"><div class="src">Data: Yahoo Finance · CNN · CBOE | 仅供参考，非投资建议</div><div>Daily Market Pulse</div></div>`;
}
loadData();
</script>
</body>
</html>
